apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-backend-hpa
  namespace: financial-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       financial-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # cool-down: don't thrash
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120

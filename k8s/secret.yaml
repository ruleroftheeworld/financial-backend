# ──────────────────────────────────────────────────────────────────────────────
# IMPORTANT: This is a TEMPLATE file.
# All values MUST be base64-encoded before applying:
#   echo -n "your-value" | base64
#
# In production, use Sealed Secrets, External Secrets Operator, or Vault Agent
# to inject secrets — never commit real values to source control.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: financial-backend-secrets
  namespace: financial-backend
  annotations:
    # Vault Annotations (if using Vault Agent Injector)
    # vault.hashicorp.com/agent-inject: "true"
    # vault.hashicorp.com/role: "financial-backend"
type: Opaque
data:
  # Database
  DATABASE_URL:              <base64-encoded-postgres-url>
  POSTGRES_PASSWORD:         <base64-encoded-password>

  # Redis
  REDIS_URL:                 <base64-encoded-redis-url>

  # JWT Keys (RS256) — mount as files via volumeMounts instead for large keys
  JWT_PRIVATE_KEY:           <base64-encoded-private-pem>
  JWT_PUBLIC_KEY:            <base64-encoded-public-pem>

  # Internal Service Token (Zero Trust)
  INTERNAL_SERVICE_TOKEN:    <base64-encoded-token>

  # Cookie Secret
  COOKIE_SECRET:             <base64-encoded-secret>

  # AES Encryption Key (for TOTP secrets at rest)
  ENCRYPTION_KEY_V1:         <base64-encoded-32-byte-key>

  # Seed passwords (remove in production)
  SEED_ADMIN_PASSWORD:       <base64-encoded-password>
  SEED_USER_PASSWORD:        <base64-encoded-password>
  SEED_ANALYST_PASSWORD:     <base64-encoded-password>
